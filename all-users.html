<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Info - All Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            padding: 2rem 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            background-color: var(--surface);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px; /* Slightly wider for potential list data */
            transition: all 0.3s ease;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.75rem;
            font-weight: 600;
            text-align: center;
        }

        .nav-links {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--text);
        }

        .input-group {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        input {
            flex: 1;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            background-color: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #334155;
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .hidden {
            display: none !important;
        }

        #loading {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        #error {
            color: var(--danger);
            background-color: rgba(239, 68, 68, 0.1);
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
            animation: fadeIn 0.3s ease-out;
            text-align: center;
        }

        .user-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            animation: fadeIn 0.4s ease-out;
        }

        .user-card:last-child {
            margin-bottom: 0;
        }

        .info-row {
            margin-bottom: 0.75rem;
            display: flex;
            flex-direction: column;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 500;
            word-break: break-all;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-links" style="display: flex; justify-content: space-between; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap;">
            <a href="index.html">Lookup</a>
            <a href="add-user.html">Add User</a>
            <a href="update-user.html">Update User</a>
            <a href="all-users.html" style="color: var(--text); border-bottom: 1px solid var(--primary);">All Data</a>
            <a href="resume.html">Resume</a>
        </div>
        
        <h1>All Data Information</h1>
        

        
        <div id="loading" class="hidden">Fetching records...</div>
        <div id="error" class="hidden"></div>
        
        <div id="resultsContainer" class="hidden">
            <!-- Dynamic data will be injected here -->
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:8000';

        // Automatically fetch data when page loads
        document.addEventListener('DOMContentLoaded', fetchAllInfo);

        async function fetchAllInfo() {
            // Reset UI
            hideElement('error');
            hideElement('resultsContainer');
            showElement('loading');

            try {
                // Modified to fetch all users data based on REST conventions
                const response = await fetch(`${API_BASE_URL}/users/`, {
                    method: 'GET',
                    headers: {
                        'accept': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`Failed to fetch: ${response.statusText} (Status: ${response.status})`);
                }

                const data = await response.json();
                renderData(data);
            } catch (err) {
                if (err.message.includes('Failed to fetch')) {
                    showError('Failed to connect to backend on port 8000. Ensure server is running and CORS is enabled.');
                } else {
                    showError(err.message);
                }
            } finally {
                hideElement('loading');
            }
        }

        function renderData(data) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';
            
            // Determine if the backend returned a list of items or a single detail object
            if (Array.isArray(data)) {
                if (data.length === 0) {
                    container.innerHTML = '<div style="text-align:center; color: var(--text-muted)">No items found.</div>';
                } else {
                    data.forEach(item => {
                        container.appendChild(createCard(item));
                    });
                }
            } else if (typeof data === 'object' && data !== null) {
                container.appendChild(createCard(data));
            } else {
                // Fallback for simple scalar responses
                container.innerHTML = `<div class="user-card">${data}</div>`;
            }
            
            showElement('resultsContainer');
        }

        function createCard(obj) {
            const card = document.createElement('div');
            card.className = 'user-card';
            
            // Extract and prominently display the ID
            const userId = obj.id || obj.user_id || obj.userid;
            if (userId !== undefined) {
                const header = document.createElement('div');
                header.style.color = 'var(--primary)';
                header.style.fontSize = '1.1rem';
                header.style.fontWeight = '600';
                header.style.marginBottom = '1rem';
                header.style.paddingBottom = '0.5rem';
                header.style.borderBottom = '1px solid rgba(255, 255, 255, 0.1)';
                header.textContent = `User ID: ${userId}`;
                card.appendChild(header);
            }
            
            for (const key in obj) {
                // Skip rendering the ID again in the normal rows
                if (key === 'id' || key === 'user_id' || key === 'userid') continue;

                if (obj[key] !== undefined && obj[key] !== null) {
                    const row = document.createElement('div');
                    row.className = 'info-row';
                    
                    const label = document.createElement('span');
                    label.className = 'info-label';
                    label.textContent = key.replace(/_/g, ' ');
                    
                    const value = document.createElement('span');
                    value.className = 'info-value';
                    
                    if (Array.isArray(obj[key])) {
                        value.textContent = obj[key].join(', ');
                    } else if (typeof obj[key] === 'object') {
                        value.textContent = JSON.stringify(obj[key], null, 2);
                    } else {
                        value.textContent = obj[key];
                    }
                    
                    row.appendChild(label);
                    row.appendChild(value);
                    card.appendChild(row);
                }
            }

            if (userId !== undefined) {
                const actionRow = document.createElement('div');
                actionRow.style.marginTop = '1rem';
                actionRow.style.paddingTop = '1rem';
                actionRow.style.borderTop = '1px solid rgba(255, 255, 255, 0.1)';
                actionRow.style.textAlign = 'center';

                const eduButton = document.createElement('a');
                eduButton.href = `resume.html?userId=${userId}`;
                eduButton.textContent = 'View Resume';
                eduButton.style.display = 'inline-block';
                eduButton.style.backgroundColor = 'transparent';
                eduButton.style.color = 'var(--text)';
                eduButton.style.padding = '0.4rem 0.8rem';
                eduButton.style.borderRadius = '0.5rem';
                eduButton.style.textDecoration = 'none';
                eduButton.style.border = '1px solid var(--primary)';
                eduButton.style.fontSize = '0.85rem';
                eduButton.style.transition = 'all 0.2s';

                eduButton.onmouseover = () => { eduButton.style.backgroundColor = 'var(--primary)'; };
                eduButton.onmouseout = () => { eduButton.style.backgroundColor = 'transparent'; };

                actionRow.appendChild(eduButton);
                card.appendChild(actionRow);
            }

            return card;
        }

        function showError(message) {
            document.getElementById('error').textContent = message;
            showElement('error');
        }

        function showElement(id) {
            document.getElementById(id).classList.remove('hidden');
        }

        function hideElement(id) {
            document.getElementById(id).classList.add('hidden');
        }


    </script>
</body>
</html>
