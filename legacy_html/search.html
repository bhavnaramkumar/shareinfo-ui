<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
        function logout() {
            sessionStorage.removeItem('isLoggedIn');
            window.location.href = 'login.html';
        }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Info - Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            padding: 2rem 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            background-color: var(--surface);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            transition: all 0.3s ease;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.75rem;
            font-weight: 600;
            text-align: center;
        }




        .input-group {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        input {
            flex: 1;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            background-color: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #334155;
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .hidden {
            display: none !important;
        }

        #loading {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        #error {
            color: var(--danger);
            background-color: rgba(239, 68, 68, 0.1);
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
            animation: fadeIn 0.3s ease-out;
            text-align: center;
        }

        .user-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            animation: fadeIn 0.4s ease-out;
        }

        .user-card:last-child {
            margin-bottom: 0;
        }

        .info-row {
            margin-bottom: 0.75rem;
            display: flex;
            flex-direction: column;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 500;
            word-break: break-all;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    
        .nav-links {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s, border-color 0.2s;
            padding-bottom: 0.25rem;
            border-bottom: 1px solid transparent;
        }

        .nav-links a:hover {
            color: var(--text);
        }
        
        .nav-links a.active {
            color: var(--text);
            border-bottom: 1px solid var(--primary);
        }
    </style>
</head>
<body>
    <div style="position: fixed; top: 0; left: 0; right: 0; text-align: center; padding: 0.5rem; font-size: 0.875rem; color: var(--text-muted); background-color: rgba(30, 41, 59, 0.8); backdrop-filter: blur(4px); z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.05);">
        🚧 BETA / TESTING ENVIRONMENT - Data is for testing purposes only 🚧
    </div>
    <div class="container">
                <div class="nav-links">
            <a href="index.html">Lookup</a>
            <a href="add-user.html">Add User</a>
            <a href="update-user.html">Update User</a>
            <a href="all-users.html">All Data</a>
            <a href="resume.html">Resume</a>
            <a href="search.html" class="active">Search</a>
            <a href="#" onclick="logout()" style="color: var(--danger); margin-left: auto;">Logout</a>
        </div>
        
        <h1>Search Profiles</h1>
        
        <form onsubmit="event.preventDefault(); performSearch();">
            <div class="input-group">
                <input type="text" id="searchInput" placeholder="Search skills, schools, projects, companies..." required>
                <button type="submit" id="searchBtn">Search</button>
            </div>
        </form>

        <div id="loading" class="hidden">Searching records...</div>
        <div id="error" class="hidden"></div>
        
        <div id="resultsContainer" class="hidden">
            <!-- Dynamic data will be injected here -->
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://shareinfo-backend-926695450073.us-central1.run.app';

        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            // Reset UI
            hideElement('error');
            hideElement('resultsContainer');
            showElement('loading');
            document.getElementById('searchBtn').disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/search/?q=${encodeURIComponent(query)}`, {
                    method: 'GET',
                    headers: {
                        'accept': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`Failed to fetch: ${response.statusText} (Status: ${response.status})`);
                }

                const data = await response.json();
                renderData(data);
            } catch (err) {
                if (err.message.includes('Failed to fetch')) {
                    showError('Failed to connect to backend on port 9000. Ensure server is running and CORS is enabled.');
                } else {
                    showError(err.message);
                }
            } finally {
                hideElement('loading');
                document.getElementById('searchBtn').disabled = false;
            }
        }

        function renderData(data) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';
            
            if (Array.isArray(data)) {
                if (data.length === 0) {
                    container.innerHTML = '<div style="text-align:center; color: var(--text-muted)">No matching users found.</div>';
                } else {
                    // Result data is a list of UserAllInfoResponse
                    data.forEach(item => {
                        container.appendChild(createCard(item.user));
                    });
                }
            } else {
                container.innerHTML = '<div style="text-align:center; color: var(--text-muted)">Unexpected response format.</div>';
            }
            
            showElement('resultsContainer');
        }

        function createCard(obj) {
            const card = document.createElement('div');
            card.className = 'user-card';
            
            const userId = obj.id || obj.user_id || obj.userid;
            if (userId !== undefined) {
                const header = document.createElement('div');
                header.style.color = 'var(--primary)';
                header.style.fontSize = '1.1rem';
                header.style.fontWeight = '600';
                header.style.marginBottom = '1rem';
                header.style.paddingBottom = '0.5rem';
                header.style.borderBottom = '1px solid rgba(255, 255, 255, 0.1)';
                header.textContent = `User ID: ${userId}`;
                card.appendChild(header);
            }
            
            for (const key in obj) {
                if (key === 'id' || key === 'user_id' || key === 'userid') continue;

                if (obj[key] !== undefined && obj[key] !== null) {
                    const row = document.createElement('div');
                    row.className = 'info-row';
                    
                    const label = document.createElement('span');
                    label.className = 'info-label';
                    label.textContent = key.replace(/_/g, ' ');
                    
                    const value = document.createElement('span');
                    value.className = 'info-value';
                    
                    value.textContent = obj[key];
                    
                    row.appendChild(label);
                    row.appendChild(value);
                    card.appendChild(row);
                }
            }

            if (userId !== undefined) {
                const actionRow = document.createElement('div');
                actionRow.style.marginTop = '1rem';
                actionRow.style.paddingTop = '1rem';
                actionRow.style.borderTop = '1px solid rgba(255, 255, 255, 0.1)';
                actionRow.style.textAlign = 'center';

                const eduButton = document.createElement('a');
                eduButton.href = `resume.html?userId=${userId}`;
                eduButton.textContent = 'View Resume';
                eduButton.style.display = 'inline-block';
                eduButton.style.backgroundColor = 'var(--primary)';
                eduButton.style.color = 'white';
                eduButton.style.padding = '0.5rem 1rem';
                eduButton.style.borderRadius = '0.5rem';
                eduButton.style.textDecoration = 'none';
                eduButton.style.fontSize = '0.9rem';
                eduButton.style.fontWeight = '500';
                eduButton.style.transition = 'all 0.2s';
                eduButton.style.marginTop = '0.5rem';

                eduButton.onmouseover = () => { eduButton.style.backgroundColor = 'var(--primary-hover)'; };
                eduButton.onmouseout = () => { eduButton.style.backgroundColor = 'var(--primary)'; };

                actionRow.appendChild(eduButton);
                card.appendChild(actionRow);
            }

            return card;
        }

        function showError(message) {
            document.getElementById('error').textContent = message;
            showElement('error');
        }

        function showElement(id) {
            document.getElementById(id).classList.remove('hidden');
        }

        function hideElement(id) {
            document.getElementById(id).classList.add('hidden');
        }
    </script>
</body>
</html>
